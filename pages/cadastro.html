<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/cad_log.css">
    <link rel="stylesheet" href="../assets/css/common.css">
    <title>Cadastro</title>
</head>
<body>
     <img src="../assets/images/Terrafone_tL.svg" alt="Logo" class="logo">

    <div class="container_cadastro">
        <h2>Cadastro</h2>
        <form>
            <label for="name">Nome:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <label for="password">Senha:</label>
            <input type="password" id="password" name="password" required>
            <label for="confirm_password">Confirmar Senha:</label>
            <input type="password" id="confirm_password" name="confirm_password" required>
            <button type="submit">Cadastrar</button>
        </form>

        não possui conta? <a href="login.html">Faça login</a>
    </div>

    <a href="../index.html" class="voltar">Voltar para a página inicial</a>
</body>
</html>
